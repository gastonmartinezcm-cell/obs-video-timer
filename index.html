<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    display: none;
  }

  /* Ocultar controles en cualquier navegador */
  video::-webkit-media-controls { display: none !important; }
  video::-webkit-media-controls-enclosure { display: none !important; }
</style>
</head>

<body>

<video id="video" muted playsinline preload="auto">
  <source src="./video.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");
const INTERVAL = 10 * 60 * 1000; // 10 minutos

async function playVideo() {
  video.style.display = "block";
  video.currentTime = 0;
  video.playbackRate = 0.8; // 🎬 cámara lenta al 70%

  try {
    await video.play();
  } catch (e) {
    console.log("Error al reproducir:", e);
  }
}

video.addEventListener("ended", () => {
  video.style.display = "none";
});

setInterval(playVideo, INTERVAL);

// reproducir al cargar
playVideo();
</script>

</body>
</html>
