<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>

<body style="margin:0; background:transparent; overflow:hidden;">
  <video
    id="v"
    muted
    autoplay
    playsinline
    preload="auto"
    controls
    style="width:100%; height:100%; display:block; background:black;"
  >
    <source src="./video.mp4" type="video/mp4" />
  </video>

  <div id="dbg" style="position:fixed; left:0; top:0; padding:6px 8px;
    font:12px Arial; color:white; background:rgba(0,0,0,.65); z-index:9999;">
    cargando...
  </div>

  <script>
    const v = document.getElementById("v");
    const dbg = document.getElementById("dbg");
    const INTERVAL = 10 * 60 * 1000; // 10 minutos

    async function playNow(){
      dbg.textContent = "intentando reproducir...";
      try {
        v.currentTime = 0;
        await v.play();
        dbg.textContent = "reproduciendo ✅";
      } catch (e) {
        dbg.textContent = "ERROR play(): " + (e?.message || e);
      }
    }

    v.addEventListener("loadeddata", () => dbg.textContent = "video cargó ✅");
    v.addEventListener("error", () => dbg.textContent = "ERROR cargando MP4 (ruta/archivo/cors)");
    v.addEventListener("ended", () => dbg.textContent = "terminó (esperando 10 min) ⏳");

    setInterval(playNow, INTERVAL);
    playNow();
  </script>
</body>
</html>
